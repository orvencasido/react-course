<!DOCTYPE html>
<html>

<head>
  <title>Lesson 2</title>
</head>

<body>
  <div class="js-container"></div>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>

  <script type="text/babel">
    function ProductDetails({ product, price, discount, img }) {
      return (
        <div style={{ marginBottom: "20px", border: "1px solid black", width: "120px", padding: "10px 20px" }}>
          <div>
            <img src={img} width="120px" />
          </div>
          {product}
          {discount ? (<del><p>Price {price}</p></del>) : (<p>Price {price}</p>)}
          {discount && <p>Discount: ${discount}</p>}
          <button>Add To Cart</button>
        </div>
      );
    }

    function App() {
      return (
        <div>
          <ProductDetails product="Cotton Socks" price="8.99" discount="5.99" img="./img/cotton-socks.png" />
          <ProductDetails product="Tennis Balls" price="5.99" img="./img/tennis-balls.png" />
          <ProductDetails product="Plain T-Shirt" price="5.99" img="./img/plain-t-shirt.png" />
        </div>
      );
    }

    const container = document.querySelector('.js-container');
    const root = ReactDOM.createRoot(container);
    root.render(<App />)
  </script>
</body>

</html>
