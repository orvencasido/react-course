<!DOCTYPE html>
<html>

<head>
  <title>React Basics</title>
</head>

<body>
  <div class="js-container"></div>



  <script type="text/babel">
    const divMain = (
      <div>
        <p>Hello World!</p>
        <button>This is a buttons!</button>
      </div>
    );

    const container = document.querySelector(`.js-container`);
    ReactDOM.createRoot(container).render(divMain);
  </script>
</body>

</html>
