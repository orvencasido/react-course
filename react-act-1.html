<!DOCTYPE html>
<html>

<head>
  <title>React Activity 1</title>
</head>

<body>
  <div class="js-container"></div>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js""></script>
    <script src=" https://unpkg.com/supersimpledev/babel.js"></script>
  <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

  <script type="text/babel">
    let productCost = 10 + (8 * 2);
    let shippingCost = 5;
    let totalCost = productCost + shippingCost;

    const date = dayjs().format('MMMM D');
    const hour = dayjs().format('HH:mm:ss');

    let setInterval(() => {
      'Current Time {hour}'
    }, 1000);

    console.log(productCost);
    const div = (
      <div>
        <button>Good Job!</button>
        <p>My name is Orven</p>
        <p>Cotton socks</p>
        <p>Price: $10</p>
        <button>Add to Cart</button>
        <p>Product Cost: ${productCost}</p>
        <p>Shipping Cost: ${shippingCost}</p>
        <p>Total Cost: ${totalCost}</p>
        <p>Today is {date}</p>
        <p>Current Time: {hour}</p>
      </div>
    );

    const container = document.querySelector(`.js-container`);
    const root = ReactDOM.createRoot(container);
    root.render(div);
  </script>
</body>

</html>
