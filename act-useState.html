<!DOCTYPE html>
<html>

<head>
  <title>UseState</title>
</head>

<body>
  <div class="js-container"></div>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>

  <script type="text/babel">

    function EmptyClicker({ setCounter }) {
      return (
        <div>
          <button onClick={() => setCounter(0)}>Reset</button>
        </div>
      );
    }

    function ButtonClicker({ counter, setCounter }) {
      function countChecker() {
        if (counter === 0) {
          return `Clicked ${counter} Time`
        } else {
          return `Clicked ${counter} Times`;
        }
      }

      return (
        <div>
          <button onClick={() => setCounter(counter + 1)}>{countChecker()}</button>
        </div>
      );
    }

    function App() {
      const [counter, setCounter] = React.useState(0);
      return (
        <div>
          <ButtonClicker counter={counter} setCounter={setCounter} />
          <ButtonClicker counter={counter} setCounter={setCounter} />
          <EmptyClicker setCounter={setCounter} />
        </div>
      );
    }

    const container = document.querySelector('.js-container');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>

</html>
